name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          GEMINI_API_KEY: placeholder-for-ci
          AUTH_SECRET: ci-placeholder-secret-min-32-characters-long
          ADMIN_EMAIL: ci@example.com
          ADMIN_PASSWORD: ci-password
