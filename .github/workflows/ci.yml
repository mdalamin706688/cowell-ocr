name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: .

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: ci-placeholder
          AUTH_SECRET: ci-placeholder-secret-min-32-characters-long
          ADMIN_EMAIL: ci@example.com
          ADMIN_PASSWORD: ci-password
